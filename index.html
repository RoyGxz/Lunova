  <meta name="theme-color" content="#f4b8c8" />
  <meta property="og:title" content="LUNOVA — Cosméticos" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
:root {
  --rosa: #f4b8c8;
  --rosa-deep: #e8899f;
  --rosa-light: #fdf0f4;
  --rosa-mid: #fae0e8;
  --blanco: #fff;
  --crema: #fdf8f5;
  --gris: #f2eef0;
  --gris-mid: #c9b8c0;
  --gris-text: #6e5a63;
  --negro: #2a1a22;
  --dorado: #c9a96e;
  --shadow-card: 0 2px 16px rgba(200,100,140,.10);
  --shadow-soft: 0 4px 24px rgba(228,140,170,.13);
  --radius: 18px;
  --radius-sm: 10px;
  --transition: .22s cubic-bezier(.4,0,.2,1);
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--font-body); background: var(--crema); color: var(--negro); min-height: 100dvh; -webkit-font-smoothing: antialiased; }
img { display: block; max-width: 100%; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ── Header ── */
header { position: sticky; top: 0; z-index: 100; background: rgba(253,240,244,.92); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--rosa-mid); padding: 0 16px; }
.header-inner { display: flex; align-items: center; justify-content: space-between; max-width: 900px; margin: 0 auto; height: 62px; gap: 12px; }
.logo { display: flex; flex-direction: column; line-height: 1; flex-shrink: 0; text-decoration: none; }
.logo-text { font-family: var(--font-display); font-size: 1.75rem; font-weight: 600; color: var(--negro); letter-spacing: .12em; }
.logo-sub { font-size: .58rem; letter-spacing: .28em; color: var(--dorado); text-transform: uppercase; margin-top: 1px; }
.search-wrap { flex: 1; position: relative; max-width: 340px; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gris-mid); pointer-events: none; }
#buscador { width: 100%; padding: 9px 14px 9px 36px; border: 1.5px solid var(--rosa-mid); border-radius: 50px; font-family: var(--font-body); font-size: .85rem; background: var(--blanco); color: var(--negro); outline: none; transition: border-color var(--transition), box-shadow var(--transition); }
#buscador::placeholder { color: var(--gris-mid); }
#buscador:focus { border-color: var(--rosa-deep); box-shadow: 0 0 0 3px rgba(232,137,159,.18); }
#btn-carrito { position: relative; width: 42px; height: 42px; border-radius: 50%; background: var(--rosa); color: var(--negro); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background var(--transition), transform var(--transition); }
#btn-carrito:hover { background: var(--rosa-deep); transform: scale(1.07); }
#carrito-badge { display: none; position: absolute; top: -4px; right: -4px; min-width: 18px; height: 18px; padding: 0 4px; border-radius: 50px; background: var(--dorado); color: var(--blanco); font-size: .62rem; font-weight: 500; align-items: center; justify-content: center; line-height: 1; }

/* ── Categorías ── */
.categorias-scroll { background: var(--blanco); border-bottom: 1px solid var(--rosa-mid); overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; }
.categorias-scroll::-webkit-scrollbar { display: none; }
#categorias-wrap { display: flex; gap: 8px; padding: 10px 16px; max-width: 900px; margin: 0 auto; white-space: nowrap; }
.cat-btn { padding: 7px 16px; border-radius: 50px; font-size: .78rem; font-weight: 500; border: 1.5px solid var(--rosa-mid); background: var(--blanco); color: var(--gris-text); letter-spacing: .02em; transition: all var(--transition); flex-shrink: 0; }
.cat-btn:hover { border-color: var(--rosa-deep); color: var(--rosa-deep); }
.cat-btn.activa { background: var(--rosa-deep); border-color: var(--rosa-deep); color: var(--blanco); }

/* ── Grid ── */
.main-content { max-width: 900px; margin: 0 auto; padding: 20px 12px 80px; }
#productos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
@media (min-width: 600px) { #productos-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 860px) { #productos-grid { grid-template-columns: repeat(4, 1fr); gap: 18px; } }

/* ── Tarjeta ── */
.card { background: var(--blanco); border-radius: var(--radius); box-shadow: var(--shadow-card); overflow: hidden; display: flex; flex-direction: column; opacity: 0; transform: translateY(16px); animation: fadeUp .5s forwards; transition: box-shadow var(--transition), transform var(--transition); }
.card:hover { box-shadow: var(--shadow-soft); transform: translateY(-3px); }
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
.card-img-wrap { position: relative; aspect-ratio: 1/1; overflow: hidden; background: var(--gris); }
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease; }
.card:hover .card-img-wrap img { transform: scale(1.06); }
.card-badge { position: absolute; top: 8px; left: 8px; padding: 3px 9px; border-radius: 50px; background: rgba(253,240,244,.9); font-size: .62rem; font-weight: 500; color: var(--rosa-deep); letter-spacing: .04em; backdrop-filter: blur(4px); }
.card-body { padding: 12px 12px 14px; display: flex; flex-direction: column; flex: 1; gap: 5px; }
.card-nombre { font-family: var(--font-display); font-size: 1rem; font-weight: 600; line-height: 1.2; color: var(--negro); }
.card-desc { font-size: .73rem; color: var(--gris-text); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
.card-precio { font-family: var(--font-display); font-size: 1.15rem; font-weight: 600; color: var(--rosa-deep); margin-top: 2px; }
.card-btns { display: flex; gap: 7px; margin-top: 8px; }

/* ── Botones ── */
.btn { display: flex; align-items: center; justify-content: center; gap: 5px; border-radius: 50px; font-size: .76rem; font-weight: 500; padding: 8px 12px; transition: all var(--transition); white-space: nowrap; }
.btn-carrito { flex: 1; background: var(--gris); color: var(--gris-text); border: 1.5px solid transparent; }
.btn-carrito:hover { background: var(--rosa-light); border-color: var(--rosa); color: var(--rosa-deep); }
.btn-carrito:active { transform: scale(.96); }
.btn-wa { flex: 1; background: var(--rosa-deep); color: var(--blanco); }
.btn-wa:hover { background: #d4728a; }
.btn-wa:active { transform: scale(.96); }

/* ── Sin resultados ── */
#sin-resultados { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 10px; color: var(--gris-mid); text-align: center; grid-column: 1 / -1; }
#sin-resultados span { font-size: 2.5rem; }
#sin-resultados p { font-size: .9rem; }

/* ── Modal ── */
#modal-carrito { position: fixed; inset: 0; z-index: 200; background: rgba(42,26,34,.4); backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
#modal-carrito.abierto { opacity: 1; pointer-events: all; }
#modal-carrito.abierto .modal-sheet { transform: translateY(0); }
.modal-sheet { width: 100%; max-width: 540px; max-height: 88dvh; background: var(--blanco); border-radius: var(--radius) var(--radius) 0 0; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .32s cubic-bezier(.4,0,.2,1); overflow: hidden; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--rosa-mid); flex-shrink: 0; }
.modal-header h2 { font-family: var(--font-display); font-size: 1.3rem; font-weight: 600; }
#btn-cerrar-modal { width: 32px; height: 32px; border-radius: 50%; background: var(--gris); color: var(--gris-text); font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background var(--transition); }
#btn-cerrar-modal:hover { background: var(--rosa-mid); }
#carrito-cuerpo { overflow-y: auto; flex: 1; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
.carrito-vacio { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 50px 20px; color: var(--gris-mid); }
.carrito-vacio span { font-size: 2.8rem; }
.carrito-vacio p { font-size: .9rem; }
.carrito-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px; border-radius: var(--radius-sm); background: var(--rosa-light); }
.carrito-item img { width: 58px; height: 58px; border-radius: 8px; object-fit: cover; background: var(--gris); flex-shrink: 0; }
.ci-info { flex: 1; min-width: 0; }
.ci-nombre { font-size: .82rem; font-weight: 500; color: var(--negro); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-precio { font-size: .72rem; color: var(--gris-text); margin-top: 2px; }
.ci-cantidad { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.ci-cantidad button { width: 26px; height: 26px; border-radius: 50%; background: var(--rosa-mid); color: var(--negro); font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background var(--transition); }
.ci-cantidad button:hover { background: var(--rosa); }
.ci-cantidad span { font-size: .85rem; font-weight: 500; min-width: 18px; text-align: center; }
.ci-derecha { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 8px; flex-shrink: 0; }
.ci-subtotal { font-family: var(--font-display); font-size: .95rem; font-weight: 600; color: var(--rosa-deep); }
.ci-eliminar { width: 24px; height: 24px; border-radius: 50%; background: transparent; color: var(--gris-mid); font-size: .75rem; display: flex; align-items: center; justify-content: center; transition: color var(--transition), background var(--transition); }
.ci-eliminar:hover { background: #ffd5e0; color: #c0304e; }
.modal-footer { border-top: 1px solid var(--rosa-mid); padding: 14px 20px 20px; flex-shrink: 0; }
.total-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.total-row span:first-child { font-size: .85rem; color: var(--gris-text); }
#carrito-total { font-family: var(--font-display); font-size: 1.4rem; font-weight: 600; color: var(--negro); }
#btn-enviar-carrito { display: none; width: 100%; align-items: center; justify-content: center; gap: 8px; padding: 15px; border-radius: 50px; background: #25d366; color: var(--blanco); font-size: .95rem; font-weight: 500; letter-spacing: .02em; transition: background var(--transition), transform var(--transition); }
#btn-enviar-carrito:hover { background: #1ebe5d; }
#btn-enviar-carrito:active { transform: scale(.97); }

/* ── Toast ── */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--negro); color: var(--blanco); font-size: .8rem; padding: 10px 20px; border-radius: 50px; opacity: 0; transition: transform .28s ease, opacity .28s ease; pointer-events: none; white-space: nowrap; z-index: 300; box-shadow: 0 4px 20px rgba(0,0,0,.22); }
#toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Footer ── */
footer { text-align: center; padding: 28px 16px; font-size: .72rem; color: var(--gris-mid); letter-spacing: .05em; border-top: 1px solid var(--rosa-mid); }
footer strong { color: var(--rosa-deep); font-weight: 500; }
</style>
</head>
<body>

<header>

      <span class="logo-text">LUNOVA</span>

<script>

const productos = [

// ── Estado ──────────────────────────────────────────────────
let carrito = [];

// ── Render productos ────────────────────────────────────────

// ── Categorías ──────────────────────────────────────────────
function renderCategorias() {
  const cats = ["Todos", ...new Set(productos.map(p => p.categoria))];
  const wrap = document.getElementById("categorias-wrap");
  wrap.innerHTML = cats.map(c => `<button class="cat-btn${c==="Todos"?" activa":""}" data-cat="${c}">${c}</button>`).join("");
  wrap.querySelectorAll(".cat-btn").forEach(btn => btn.addEventListener("click", () => {
    wrap.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("activa"));
    btn.classList.add("activa");
    filtrar();
  }));
}

function filtrar() {
  const q   = document.getElementById("buscador").value.toLowerCase().trim();
  const cat = document.querySelector(".cat-btn.activa")?.dataset.cat || "Todos";
  renderProductos(productos.filter(p => {
    const ok_cat = cat === "Todos" || p.categoria === cat;
    const ok_q   = !q || p.nombre.toLowerCase().includes(q) || p.descripcion.toLowerCase().includes(q) || p.categoria.toLowerCase().includes(q);
    return ok_cat && ok_q;
  }));
}

// ── Carrito ─────────────────────────────────────────────────
function agregarAlCarrito(id) {
  const p = productos.find(x => x.id === id); if (!p) return;
  const e = carrito.find(x => x.id === id);
  e ? e.cantidad++ : carrito.push({...p, cantidad:1});
  actualizarCarrito();
  mostrarToast(`✓ ${p.nombre} agregado`);
}
function eliminarDelCarrito(id) { carrito = carrito.filter(x => x.id !== id); actualizarCarrito(); renderCarritoModal(); }
function cambiarCantidad(id, d) {
  const it = carrito.find(x => x.id === id); if (!it) return;
  it.cantidad += d;
  it.cantidad <= 0 ? eliminarDelCarrito(id) : (actualizarCarrito(), renderCarritoModal());
}
function actualizarCarrito() {
  const total = carrito.reduce((a,i) => a+i.cantidad, 0);
  const b = document.getElementById("carrito-badge");
  b.textContent = total; b.style.display = total > 0 ? "flex" : "none";
}
function renderCarritoModal() {
  const cuerpo = document.getElementById("carrito-cuerpo");
  const totalEl = document.getElementById("carrito-total");
  const btnEnviar = document.getElementById("btn-enviar-carrito");
  if (carrito.length === 0) {
    cuerpo.innerHTML = `<div class="carrito-vacio"><span>🛍️</span><p>Tu carrito está vacío</p></div>`;
    totalEl.textContent = "S/ 0.00"; btnEnviar.style.display = "none"; return;
  }
  btnEnviar.style.display = "flex";
  const sub = carrito.reduce((a,i) => a + i.precio*i.cantidad, 0);
  totalEl.textContent = `S/ ${sub.toFixed(2)}`;
  cuerpo.innerHTML = carrito.map(item => `
    <div class="carrito-item">
      <img src="${item.imagen || PLACEHOLDER}" alt="${item.nombre}" onerror="this.src='${PLACEHOLDER}'"/>
      <div class="ci-info">
        <p class="ci-nombre">${item.nombre}</p>
        <p class="ci-precio">S/ ${item.precio.toFixed(2)} c/u</p>
        <div class="ci-cantidad">
          <button onclick="cambiarCantidad(${item.id},-1)">−</button>
          <span>${item.cantidad}</span>
          <button onclick="cambiarCantidad(${item.id},1)">+</button>
        </div>
      </div>
      <div class="ci-derecha">
        <p class="ci-subtotal">S/ ${(item.precio*item.cantidad).toFixed(2)}</p>
        <button class="ci-eliminar" onclick="eliminarDelCarrito(${item.id})">✕</button>
      </div>
    </div>`).join("");
}
function abrirCarrito() { renderCarritoModal(); document.getElementById("modal-carrito").classList.add("abierto"); document.body.style.overflow="hidden"; }
function cerrarCarrito() { document.getElementById("modal-carrito").classList.remove("abierto"); document.body.style.overflow=""; }

// ── WhatsApp ────────────────────────────────────────────────
function pedirWhatsapp(id) {
  const p = productos.find(x => x.id === id); if (!p) return;
  const msg = encodeURIComponent(`Hola, quiero pedir:\n\nProducto: ${p.nombre}\nPrecio: S/ ${p.precio.toFixed(2)}\nTienda: LUNOVA 🌸`);
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, "_blank");
}
function enviarCarritoWhatsapp() {
  if (!carrito.length) return;
  const lineas = carrito.map(i => `• ${i.nombre} x${i.cantidad} — S/ ${(i.precio*i.cantidad).toFixed(2)}`);
  const total  = carrito.reduce((a,i) => a + i.precio*i.cantidad, 0);
  const msg = encodeURIComponent(`Hola, quiero hacer un pedido en LUNOVA 🌸\n\n${lineas.join("\n")}\n\n*Total: S/ ${total.toFixed(2)}*\n\nTienda: LUNOVA`);
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, "_blank");
}

// ── Toast ────────────────────────────────────────────────────
function mostrarToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("visible");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("visible"), 2200);
}

// ── Init ─────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  renderCategorias();
  renderProductos(productos);
  document.getElementById("buscador").addEventListener("input", filtrar);
  document.getElementById("btn-carrito").addEventListener("click", abrirCarrito);
  document.getElementById("btn-cerrar-modal").addEventListener("click", cerrarCarrito);
  document.getElementById("btn-enviar-carrito").addEventListener("click", enviarCarritoWhatsapp);
  document.getElementById("modal-carrito").addEventListener("click", e => { if (e.target===e.currentTarget) cerrarCarrito(); });
});
</script>
</body>
